services:
  # ── Banco de dados ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432" # expõe localmente para usar no DBeaver/TablePlus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API (AdonisJS) ────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:3333}
      SESSION_DRIVER: ${SESSION_DRIVER:-cookie}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_NAME}
    ports:
      - "3333:3333"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Nginx servindo o build do React) ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api} # proxy via nginx por padrão
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

  # ── Crawler (roda e sai — executado manualmente ou via cron) ─────
  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      LEGISLATURA: ${LEGISLATURA:-57}
      ANO: ${ANO:-2024}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - crawler # não sobe junto com o `docker compose up`

volumes:
  pgdata:
