services:
  # ── Banco de dados ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432" # expõe localmente para usar no DBeaver/TablePlus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API (.NET 10) ─────────────────────────────────────────────────
  api:
    build:
      context: ./api-dotnet
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:3333
      ConnectionStrings__DefaultConnection: "Host=${DB_HOST:-db};Port=${DB_PORT:-5432};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - "3333:3333"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Nginx servindo o build do React) ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api} # proxy via nginx por padrão
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

  # ── Crawler (carga inicial + agendamento APScheduler) ────────────
  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      LEGISLATURA: ${LEGISLATURA:-57}
      TZ: ${TZ:-America/Sao_Paulo}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
