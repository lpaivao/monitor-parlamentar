services:
  # ── API (.NET) ────────────────────────────────────────────────
  - type: web
    name: monitor-api
    runtime: docker
    dockerContext: ./api-dotnet
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false # O usuário deve configurar a string de conexão manualmente no painel do Render

